<!DOCTYPE html>
<html>
<head>
<title>SiteControl Live Ops</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

button {
  display:block;
  width:90%;
  margin:10px auto;
  padding:15px;
  font-size:18px;
  background:orange;
  border:none;
  border-radius:8px;
}

.hidden { display:none; }

.alert {
  background:red;
  padding:10px;
  margin:10px;
  border-radius:6px;
  animation:flash 1s infinite;
}

@keyframes flash {
  0%{opacity:1;}
  50%{opacity:.5;}
  100%{opacity:1;}
}
</style>

</head>

<body>

<h1>LIVE OPERATIONS SIMULATION</h1>
<h2>SiteControl</h2>
<p>NOT A GAME — Real Ops Decision System</p>

<input id="name" placeholder="Enter your name" style="padding:10px; width:80%;"/>

<h3>Select Role</h3>
<button onclick="start('Manager')">Manager</button>
<button onclick="start('Supervisor')">Supervisor</button>
<button onclick="start('Officer')">Officer</button>
<button onclick="start('Client')">Client</button>

<div id="dashboard" class="hidden">
  <h2 id="title"></h2>

  <div id="alerts"></div>

  <p id="scenarioText"></p>

  <button onclick="decision(0)">Ignore situation</button>
  <button onclick="decision(1)">Call backup</button>
  <button onclick="decision(2)">Cover post yourself</button>
</div>

<div id="result" class="hidden">
  <h2>FINAL PERFORMANCE</h2>
  <p id="scoreText"></p>
</div>

<script>
let score = 0;
let step = 0;

let scenarios = [
  "🚨 2 Officers called off. No coverage.",
  "🚨 Client complaining about response delay.",
  "🚨 Suspicious person reported inside building.",
  "🚨 Emergency alarm triggered — unknown cause."
];

function start(role){
  let name = document.getElementById("name").value || "Operator";

  document.getElementById("title").innerText =
    role + " " + name + " — LIVE DASHBOARD";

  document.getElementById("dashboard").classList.remove("hidden");

  nextScenario();

  setInterval(randomAlert, 4000);
}

function randomAlert(){
  let alertBox = document.getElementById("alerts");
  let alert = document.createElement("div");
  alert.className = "alert";
  alert.innerText = "⚠️ DISPATCH: New activity detected";
  alertBox.prepend(alert);

  setTimeout(()=>{ alert.remove(); },3000);
}

function nextScenario(){
  if(step >= scenarios.length){
    endSimulation();
    return;
  }

  document.getElementById("scenarioText").innerText =
    scenarios[step];
}

function decision(choice){
  if(choice === 2){
    score += 3;
  }
  else if(choice === 1){
    score += 2;
  }
  else{
    score += 1;
  }

  step++;
  nextScenario();
}

function endSimulation(){
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let rating = Math.min(10, score);

  let message = "";

  if(rating >= 8){
    message = "🔥 ELITE OPERATOR — Strong leadership decisions";
  }
  else if(rating >= 5){
    message = "⚠️ MID LEVEL — Good but needs improvement";
  }
  else{
    message = "❌ HIGH RISK — Poor operational decisions";
  }

  document.getElementById("scoreText").innerText =
    "Score: " + rating + "/10\n" + message;
}
</script>

</body>
</html>
